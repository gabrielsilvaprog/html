<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipos de box</title>
    <style>h1{ text-align: center;outline: 3px dashed red;
border: 1px solid black; 
    }
    h2{
border: 1px solid black; height: 200px;outline: 3px dashed red;
width: 200px; margin: auto;
    }
    h3{ font-weight: normal; outline: 3px dashed red;
border: 1px solid black;
    }
    p{ padding: 5px 3px; outline: 3px dashed red;
border: 1px solid black;
    }
    a{  margin: 0px;
        border: 1px solid black;
        background-color: aliceblue;
    }
    a#a2{ display: block;
text-align: center; 

margin: auto;
    }
    h2#hdois{
        margin: auto;
        height: auto;
        
    }
    </style>
</head>
<body>
    <h1>Caixas</h1>

    <h2>box-level</h2> <h3>Os títulos são exemplo de caixas box-level</h3>
    
    

    <h2>inline-level</h2>
    <p>Os parágrafos são box-level mas os <a href="#">Links</a> são
    exemplos de inline-level</p>
    <h2 id="hdois"> mudando o tipo de caixa</h2>
    <p >mudando o tipo de caixa dos<a href="#" id="a2"> links</a> de inline-level
    para box-level essa tag passa a obedecer o tipo da caixa</p>
</body>
</html>
