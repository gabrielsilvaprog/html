<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionando conteúdos</title>
    <style>
iframe{
    display: block;
    margin: auto;
}
    </style>
</head>
<body>
    <h1>Conteúdos nos iframe</h1>
    <h2>Vídeos</h2>
    <iframe width="560" height="315" 
    src="https://www.youtube.com/embed/dzhJsc1YszU?si=VuIJsrnn5JuQVIaw" 
    title="YouTube video player" 
    frameborder="0"
     allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope;
      picture-in-picture; web-share"
      referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    <h2>Mapas</h2>
    <iframe
    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d436718.5051980716!2d121.14710433720535!3d31.224515849274866!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x35b27040b1f53c33%3A0x295129423c364a1!2sXangai%2C%20China!5e0!3m2!1spt-BR!2sbr!4v1784221037354!5m2!1spt-BR!2sbr"
     width="600" height="450"
      style="border:0;" allowfullscreen="" loading="lazy" 
    referrerpolicy="strict-origin-when-cross-origin"></iframe>
    <h2>Google docs</h2>
    <iframe width="600" height="450" src="https://docs.google.com/document/d/e/2PACX-1vQc0NhNv5crZoOkrn_y7jlYnYk2NNkd_JGkD0DsZLRsH1l-JbHCmOwzgXK34VEhv-GQ6TA_TbqYHZdA/pub?embedded=true"></iframe>
    </body>
</html>
