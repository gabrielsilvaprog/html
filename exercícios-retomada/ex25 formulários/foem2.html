<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senha</title>
    <style>
input{
    margin: 5px;
}
spam{
    color: red;
}
    </style>
<body>
    <form action="senha.php" method="post" autocomplete="on">

<div>
    <label for="iuser"><spam>*</spam>Usuário:</label>
    <input type="text" name="user" id="iuser" required
    placeholder="Insira o nome de usuário">
</div> 

<div>
    <label for="isenha"><spam>*</spam>Senha:</label>
    <input type="password" name="senha" id="isenha" required
    minlength="8" maxlength="20"
    placeholder="Insira a senha de usuário" autocomplete="current-password"> 
</div>


<input type="submit" value="Enviar">
<input type="reset" value="Limpar">

    </form>
    
</body>
</html>
