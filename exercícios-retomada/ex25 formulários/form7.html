<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<style>
input,select{
    margin: 3px;
}
</style>
</head>
<body>
<form action="senha.php" method="post">
<div>

<label for="itext">Texto</label>
<input type="text" name="text" id="itext">

</div>
<div>
    <input type="checkbox" name="box" id="iescolha">
    <label for="iescolha">Ecolha</label>
</div>
<div>
    <label for="iest">Estado</label>
    <select name="est" id="iest">
        <optgroup label="Região sul">
            <option value="PR">Paraná</option>
            <option value="SC">Santa catarina</option>
            <option value="RS">Rio Grande do Sul</option>
        </optgroup>
    </select>
</div>

<div>
    <label for="ipro">Profissão</label>
    <input type="text" name="pro" id="ipro" list="iprof">
    <datalist id="iprof">
        <option>Administrador</option>
        <option>Professor</option>
        <option>Médico</option>

    </datalist>
</div>
<div>
    <label for="imsg">Mensagem</label> <br>
    <textarea name="msg" id="imsg" cols="30" rows="30"></textarea>
</div>

<input type="submit" value="Enviar">
<input type="reset" value="Limpar">



</form>    
</body>
</html>
