<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-mail e telefone</title>
    <style>
input{
    margin: 3px;
}
    </style>
</head>
<body>
    <form action="senha.php" method="post" autocomplete="on">

        <fieldset>
            <legend>Dados</legend>
            <div>
                <label for="imail">E-mail</label>
                <input type="email" name="mail" id="imail" required autocomplete="email">
            </div>
            <div>
                <label for="itel">Telefone</label>
                <input type="tel" name="tel" id="itel" required autocomplete="tel">
            </div>
            
        </fieldset>
        <input type="submit" value="Enviar"> <input type="reset" value="Limpar">

    </form>
    <!--no futuro estudar RegEx para melhorar formulários-->
</body>
</html>
