<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treino mescla</title>
    <style>
        body{
            background-color: black;
        }
        table{
            
            width: 650px;
            height: 400px;
            text-align: center;
            background-color: rgb(41, 41, 41);
            color: white;
            margin: auto;
        }
        td{
            border: 1px solid rgb(255, 255, 255);
            width: 40px;
            
        }
        td:hover{
            background-color: rgb(226, 43, 128);
        }
    </style>
</head>

<body>
    <table>
        <caption> tabela desafio de mescla 1</caption>
        <tr><td>1</td> <td>2</td> <td rowspan="2">3</td> <td>4</td></tr>
        <tr><td>5</td> <td>6</td>           <td>7</td></tr>
        <tr><td colspan="3">8</td>                     <td>9</td></tr>
        <tr><td rowspan="2">10</td> <td colspan="2">11</td>           <td>12</td></tr>
        <tr>          <td>13</td> <td>14</td> <td>15</td></tr>
    </table>
    <br>
    <table>
<caption>tabela desafio de mescla 2</caption>
<tr> <td colspan="4">A</td>                  <td rowspan="4">B</td></tr>
<tr> <td rowspan="4">C</td> <td>D</td> <td>E</td> <td>F</td>  </tr>
<tr>                  <td>G</td> <td>H</td> <td>I</td>          </tr>
<tr>                  <td>J</td> <td>K</td> <td>L</td>          </tr>
<tr>                  <td colspan="4">M</td> </tr>


    </table>
</body>
</html>
