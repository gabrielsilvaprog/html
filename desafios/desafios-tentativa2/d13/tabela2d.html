<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio tabela de notas</title>
    <style>
        table{
            border-collapse: collapse;
        }
        td,th{
            border: 1px solid black;
        }
td{
width: 100px;
height: 30px;
text-align: center;
}
.head, thead{
background-color: grey;
color: white;
padding: 10px 3px;
}
thead{
    height: 60px;
}
.h {
    text-align: left;
    padding-left: 3px;
}
    </style>
</head>
<body>
    <table>
        <thead>
<tr> <th  rowspan="2">Àrea</th> <th colspan="2" rowspan="2">Disciplinas</th> <th colspan="2">Notas</th>  <th rowspan="2">Média</th> </tr>
<tr><th>Nota 1</th><th>Nota 2</th></tr>
        </thead>
        <tbody>
<tr > <th rowspan="4">Exatas</th> <td colspan="2"> Matemática</td> <td>0.0</td> <td>0.0</td> <td>0.0</td> </tr>
<tr> <td colspan="2">Física</td> <td>0.0</td> <td>0.0</td> <td>0.0</td> </tr>
<tr> <td colspan="2">Química</td> <td>0.0</td> <td>0.0</td> <td>0.0</td> </tr>
<tr> <td colspan="2">Biologia</td> <td>0.0</td> <td>0.0</td> <td>0.0</td> </tr>
<tr class="head"> <td colspan="5" class="h">Média de exatas </td> <td>0.0 </td> </tr>
<tr></tr>
<tr> <th rowspan="2">Humanas</th> <td colspan="2">História</td> <td>0.0</td> <td>0.0</td> <td>0.0 </td> </tr>
<tr> <td colspan="2">Geografia</td> <td>0.0</td> <td>0.0</td> <td>0.0</td> </tr>
<tr class="head"> <td colspan="5" class="h">Média de humanas </td> <td>0.0 </td> </tr>        
</tbody>
    </table>
</body>
</html>
