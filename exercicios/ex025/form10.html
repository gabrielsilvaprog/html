<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form10</title>

    <style>
body{
    background-color: rgb(41, 41, 41); color: white;
}

input{
    border-radius: 10px;}



</style>

</head>
<body>
    
<form action="cadastro.php" method="get" autocomplete="on">

<p>
<label for="iano">Que ano você nasceu?</label>
<input type="number" name="iano" id="iano" min="1900" max="2025"
oninput="calcidade()">

</p>

<p>
<label for="iidade"> Você faz: </label>
<output id="iidade">0</output>

</p>


<p>
<input type="submit" id="isubmit" name="enviar" value="enviar">
<input type="reset" id="ireset" name="limpar" value="limpar">
</p>



</form>

<script>
function calcidade() {
let atual = new Date().getFullYear()
iidade.innerHTML = Number(atual) - Number(iano.value)


}


</script>




</body>
</html>
